<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fafafa">
</head>
<body>
  <div id="app">

    <!-- ===== 入力エリア ===== -->
    <div class="input-area">
      <input type="text" id="text-input" placeholder="なんでも書いてね" autofocus>

      <!-- タグ -->
      <div class="tag-row">
        <input type="text" id="tag-input" placeholder="タグ（自由入力でサジェスト）" oninput="onTagInput(event)">
        <div id="tag-suggestions"></div>
        <div id="top-tags"></div>
      </div>

      <!-- 気分（日記モード時のみ意味あり） -->
      <div class="mood-row">
        <button class="mood-btn" onclick="selectMood(this,'1')">😢</button>
        <button class="mood-btn" onclick="selectMood(this,'2')">😞</button>
        <button class="mood-btn" onclick="selectMood(this,'3')">😐</button>
        <button class="mood-btn" onclick="selectMood(this,'4')">🙂</button>
        <button class="mood-btn" onclick="selectMood(this,'5')">😊</button>
        <button class="mood-btn" onclick="selectMood(this,'6')">🤩</button>
      </div>

      <!-- ToDo options -->
      <div id="todo-options">
        <input type="date" id="due-input">
        <select id="priority-select">
          <option value="mid">🟡 普通</option>
          <option value="high">🔴 高</option>
          <option value="low">🔵 低</option>
        </select>
        <select id="mustwant-select">
          <option value="">-</option>
          <option value="must">MUST</option>
          <option value="want">WANT</option>
        </select>
      </div>

      <!-- アクションボタン -->
      <div class="action-row">
        <button id="todo-btn" onclick="toggleTodo()">☑ ToDo</button>
        <button id="voice-btn" onclick="startVoice()">🎤 音声</button>
        <button id="save-btn" onclick="saveEntry()">記録する</button>
      </div>
    </div>

    <!-- ===== ダッシュボード ===== -->

    <div class="section">
      <h3>📝 今日の記録</h3>
      <div id="today-entries"></div>
    </div>

    <div class="section">
      <h3>☑ やること <span id="todo-count">0</span>件</h3>
      <div id="todo-list"></div>
    </div>

    <div class="section">
      <div id="this-day"></div>
    </div>

    <div class="section">
      <h3>✅ 最近の完了</h3>
      <div id="done-list"></div>
    </div>

    <div class="section">
      <h3>🔥 30日ストリーク</h3>
      <div id="streak"></div>
    </div>

    <div class="footer">
      <a href="https://docs.google.com/spreadsheets/d/18gLFvDehIUBD812F7Cy-r2_hfR_1whXakg5gb-vVmww/edit" target="_blank">📊 スプレッドシートを開く</a>
    </div>

  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
