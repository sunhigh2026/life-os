<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日記 - Life OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-pia.png">
  <meta name="theme-color" content="#F5FBF8">
</head>
<body>
<div class="app-wrapper">

  <!-- 検索バー -->
  <div class="search-area">
    <div class="row">
      <input type="date" id="fromDate" style="flex:1;">
      <span style="color:var(--muted);padding:0 4px;">〜</span>
      <input type="date" id="toDate" style="flex:1;">
      <button class="btn-now" onclick="search()">検索</button>
    </div>
    <div class="row">
      <input type="text" id="keyword" placeholder="キーワードで絞り込み（任意）" style="flex:1;">
    </div>
  </div>

  <!-- N年前の今日 -->
  <div id="lookbackSection" class="dashboard" style="display:none;">
    <div class="section" id="sectionLookback" style="background:linear-gradient(135deg,#fff8f0 0%,#fff0f5 100%);">
      <div class="section-header" id="lookbackHeader">📅 この日の振り返り</div>
      <div class="section-body" id="lookbackList"></div>
    </div>
  </div>

  <!-- 結果一覧 -->
  <div id="resultList" class="dashboard"></div>

</div>

<!-- 編集モーダル -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:12px;">
    <div style="font-weight:600;font-size:15px;">日記を編集</div>
    <input type="hidden" id="editId">
    <input type="datetime-local" id="editDatetime">
    <input type="text" id="editTag" placeholder="タグ">
    <div style="display:flex;gap:6px;" id="editMoodRow">
      <span style="font-size:12px;color:var(--muted);align-self:center;">気分:</span>
      <button class="mood-btn" data-mood="1" onclick="setEditMood(1)">😢</button>
      <button class="mood-btn" data-mood="2" onclick="setEditMood(2)">😞</button>
      <button class="mood-btn" data-mood="3" onclick="setEditMood(3)">😐</button>
      <button class="mood-btn" data-mood="4" onclick="setEditMood(4)">🙂</button>
      <button class="mood-btn" data-mood="5" onclick="setEditMood(5)">😊</button>
      <button class="mood-btn" data-mood="6" onclick="setEditMood(6)">🤩</button>
    </div>
    <textarea id="editText" rows="4" style="resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:10px;padding:8px 12px;"></textarea>
    <!-- 写真セクション -->
    <div id="editPhotoSection">
      <div id="editPhotoPreview" style="display:none;">
        <img id="editPhotoImg" class="edit-photo-preview" alt="写真プレビュー">
      </div>
      <div id="editPhotoActions" style="display:flex;gap:8px;align-items:center;">
        <label class="btn-photo-add" style="font-size:13px;padding:6px 12px;border:1px dashed var(--border);border-radius:10px;cursor:pointer;color:var(--text-sub);display:inline-flex;align-items:center;gap:4px;">
          <span id="editPhotoLabel">写真を追加</span>
          <input type="file" id="editPhotoInput" accept="image/*" style="display:none;" onchange="onPhotoSelected(this)">
        </label>
        <button id="editPhotoDeleteBtn" onclick="deleteEditPhoto()" style="display:none;font-size:12px;padding:4px 10px;border:1px solid #ffcdd2;border-radius:8px;background:#fff5f5;cursor:pointer;color:#e53935;">写真を削除</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-submit" onclick="saveEdit()">保存</button>
      <button class="btn-submit" onclick="closeEdit()" style="background:#aaa;">キャンセル</button>
    </div>
  </div>
</div>

<!-- Google Sheets リンク -->
<a href="https://docs.google.com/spreadsheets/d/1TJ6Q6tHzxz7fN4PxbMD7fWMVIW6eyoxKYiyeXKgz35w/edit" class="sheets-fab" target="_blank" rel="noopener" title="Google スプレッドシートで見る">📊</a>

<div id="toast"></div>

<script>
const AUTH_KEY = 'hidapia2026';
const MOODS = { 1: '😢', 2: '😞', 3: '😐', 4: '🙂', 5: '😊', 6: '🤩' };
let editMood = null;
let allEntries = [];

// 初期化: 今月を表示 + 振り返りロード
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const firstOfMonth = today.slice(0, 7) + '-01';
  document.getElementById('fromDate').value = firstOfMonth;
  document.getElementById('toDate').value = today;
  search();
  loadLookback();
});

async function apiFetch(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH_KEY}`, ...(options.headers || {}) };
  const res = await fetch(path, { ...options, headers });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
  return res.json();
}

async function search() {
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  const keyword = document.getElementById('keyword').value.trim().toLowerCase();

  try {
    const params = new URLSearchParams({ limit: '200' });
    if (from) params.set('from', from);
    if (to) params.set('to', to);
    const data = await apiFetch(`/api/entry?${params}`);
    allEntries = data.entries;
    const filtered = keyword
      ? allEntries.filter(e => (e.text || '').toLowerCase().includes(keyword) || (e.tag || '').toLowerCase().includes(keyword))
      : allEntries;
    renderEntries(filtered);
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  }
}

function renderEntries(entries) {
  const el = document.getElementById('resultList');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-msg" style="padding:32px 0;">この期間の記録はありません</div>';
    return;
  }

  // 日付ごとにグループ化
  const groups = {};
  entries.forEach(e => {
    const d = e.datetime.slice(0, 10);
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  el.innerHTML = Object.entries(groups).map(([date, items]) => `
    <div class="section">
      <div class="section-header">${date}（${items.length}件）</div>
      <div class="section-body">
        ${items.map(e => `
          <div class="entry-item">
            <div class="entry-time">${e.datetime.slice(11, 16)}</div>
            <div class="entry-mood">${e.mood ? MOODS[e.mood] : ''}</div>
            <div class="entry-content">
              ${e.tag ? `<div class="entry-tag">#${e.tag}</div>` : ''}
              <div class="entry-text">${escHtml(e.text || '').replace(/\n/g, '<br>')}</div>
              ${e.photo_url ? `<img class="entry-photo-thumb" data-photo-key="${escHtml(e.photo_url)}" onclick="openLightbox('${escHtml(e.photo_url)}')" alt="写真">` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
              <button onclick="shareToX(${JSON.stringify(e).replace(/"/g, '&quot;')})" class="share-x-btn" title="Xに共有">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </button>
              <button onclick="openEdit(${JSON.stringify(e).replace(/"/g, '&quot;')})"
                style="font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:8px;background:#f5f5f5;cursor:pointer;">✏️</button>
              <button onclick="deleteEntry('${e.id}', this)"
                style="font-size:12px;padding:4px 8px;border:1px solid #ffcdd2;border-radius:8px;background:#fff5f5;cursor:pointer;color:#e53935;">🗑</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  loadVisiblePhotos(el);
}

// 編集
function openEdit(entry) {
  editMood = entry.mood;
  document.getElementById('editId').value = entry.id;
  document.getElementById('editDatetime').value = entry.datetime.slice(0, 16);
  document.getElementById('editTag').value = entry.tag || '';
  document.getElementById('editText').value = entry.text || '';
  document.querySelectorAll('#editMoodRow .mood-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.mood) === entry.mood);
  });
  setupEditPhoto(entry);
  document.getElementById('editModal').style.display = 'flex';
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
}

function setEditMood(v) {
  editMood = v;
  document.querySelectorAll('#editMoodRow .mood-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.mood) === v);
  });
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const datetime = document.getElementById('editDatetime').value;
  const tag = document.getElementById('editTag').value.trim() || null;
  const text = document.getElementById('editText').value.trim();

  try {
    await apiFetch('/api/entry', {
      method: 'PUT',
      body: JSON.stringify({ id, datetime, mood: editMood, tag, text }),
    });
    await savePhotoChanges(id);
    showToast('✅ 更新しました');
    closeEdit();
    search();
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  }
}

// 削除
async function deleteEntry(id, btn) {
  if (!confirm('この記録を削除しますか？')) return;
  btn.disabled = true;
  try {
    await apiFetch(`/api/entry?id=${id}`, { method: 'DELETE' });
    showToast('🗑 削除しました');
    search();
  } catch (e) {
    btn.disabled = false;
    showToast(`エラー: ${e.message}`);
  }
}

// Toast
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ==============================
// N年前の今日（振り返り）
// ==============================
async function loadLookback() {
  try {
    const data = await apiFetch('/api/dashboard');
    const entries = data.lookback || [];
    const section = document.getElementById('lookbackSection');
    const header = document.getElementById('lookbackHeader');
    const el = document.getElementById('lookbackList');

    if (!entries.length) {
      section.style.display = 'none';
      return;
    }

    section.style.display = '';

    // 今日のMM/DD
    const now = new Date();
    const mmdd = `${String(now.getMonth()+1)}/${String(now.getDate())}`;
    header.textContent = `📅 ${mmdd} の振り返り`;

    // 年ごとにグループ化して「N年前」ラベルを付ける
    const thisYear = now.getFullYear();
    const byYear = {};
    entries.forEach(e => {
      const year = parseInt(e.datetime.slice(0, 4));
      if (!byYear[year]) byYear[year] = [];
      byYear[year].push(e);
    });

    el.innerHTML = Object.entries(byYear)
      .sort((a, b) => parseInt(b[0]) - parseInt(a[0]))
      .map(([year, items]) => {
        const yearsAgo = thisYear - parseInt(year);
        const label = yearsAgo === 1 ? '1年前' : `${yearsAgo}年前`;
        return `
          <div class="lookback-year">${label}（${year}年）</div>
          ${items.map(e => `
            <div class="entry-item">
              <div class="entry-time">${e.datetime.slice(11, 16)}</div>
              <div class="entry-mood">${e.mood ? MOODS[e.mood] : ''}</div>
              <div class="entry-content">
                ${e.tag ? `<div class="entry-tag">#${e.tag}</div>` : ''}
                <div class="entry-text">${escHtml(e.text || '').replace(/\n/g, '<br>')}</div>
                ${e.photo_url ? `<img class="entry-photo-thumb" data-photo-key="${escHtml(e.photo_url)}" onclick="openLightbox('${escHtml(e.photo_url)}')" alt="写真">` : ''}
              </div>
            </div>
          `).join('')}
        `;
      }).join('');
    loadVisiblePhotos(el);
  } catch (_) {}
}

function shareToX(entry) {
  const moodEmojis = { 1: '😢', 2: '😞', 3: '😐', 4: '🙂', 5: '😊', 6: '🤩' };
  const mood = moodEmojis[entry.mood] || '';
  const tag = entry.tag ? `【${entry.tag}】` : '';
  const body = (entry.text || '').length > 100 ? entry.text.slice(0, 100) + '…' : (entry.text || '');
  const text = `${mood} ${tag}${body}\n#LifeOS日記`;
  const url = `https://x.com/intent/post?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==============================
// 写真機能
// ==============================
let editPhotoBlob = null;    // 新規選択された画像Blob
let editPhotoKey = null;     // 既存の写真キー
let editPhotoChanged = false;

async function processImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 1080;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const minSide = Math.min(img.width, img.height);
      const sx = (img.width - minSide) / 2;
      const sy = (img.height - minSide) / 2;
      ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);
      canvas.toBlob((blob) => {
        URL.revokeObjectURL(img.src);
        resolve(blob);
      }, 'image/webp', 0.8);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function loadAuthImage(imgEl, key) {
  const res = await fetch(`/api/photos/${key}`, {
    headers: { 'Authorization': `Bearer ${AUTH_KEY}` },
  });
  if (res.ok) {
    const blob = await res.blob();
    imgEl.src = URL.createObjectURL(blob);
  }
}

function loadVisiblePhotos(container) {
  const imgs = (container || document).querySelectorAll('.entry-photo-thumb[data-photo-key]');
  imgs.forEach(img => {
    if (!img.src || img.src === location.href) {
      loadAuthImage(img, img.dataset.photoKey);
    }
  });
}

async function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  editPhotoBlob = await processImage(file);
  editPhotoChanged = true;
  const preview = document.getElementById('editPhotoPreview');
  const img = document.getElementById('editPhotoImg');
  img.src = URL.createObjectURL(editPhotoBlob);
  preview.style.display = '';
  document.getElementById('editPhotoLabel').textContent = '写真を変更';
  document.getElementById('editPhotoDeleteBtn').style.display = '';
  input.value = '';
}

function deleteEditPhoto() {
  editPhotoBlob = null;
  editPhotoChanged = true;
  editPhotoKey = null;
  document.getElementById('editPhotoPreview').style.display = 'none';
  document.getElementById('editPhotoImg').src = '';
  document.getElementById('editPhotoLabel').textContent = '写真を追加';
  document.getElementById('editPhotoDeleteBtn').style.display = 'none';
}

function setupEditPhoto(entry) {
  editPhotoBlob = null;
  editPhotoChanged = false;
  editPhotoKey = entry.photo_url || null;
  const preview = document.getElementById('editPhotoPreview');
  const img = document.getElementById('editPhotoImg');
  const deleteBtn = document.getElementById('editPhotoDeleteBtn');

  if (editPhotoKey) {
    preview.style.display = '';
    deleteBtn.style.display = '';
    document.getElementById('editPhotoLabel').textContent = '写真を変更';
    img.src = '';
    loadAuthImage(img, editPhotoKey);
  } else {
    preview.style.display = 'none';
    deleteBtn.style.display = 'none';
    document.getElementById('editPhotoLabel').textContent = '写真を追加';
    img.src = '';
  }
}

async function savePhotoChanges(entryId) {
  if (!editPhotoChanged) return;

  if (editPhotoBlob) {
    // 新しい写真をアップロード（既存写真はサーバー側で自動削除）
    const formData = new FormData();
    formData.append('photo', editPhotoBlob, 'photo.webp');
    const res = await fetch(`/api/entry-photo?id=${entryId}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AUTH_KEY}` },
      body: formData,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Photo upload failed');
    }
  } else {
    // 写真が削除された（editPhotoBlobもeditPhotoKeyもnull）
    const res = await fetch(`/api/entry-photo?id=${entryId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${AUTH_KEY}` },
    });
    // 写真がなかった場合の404は無視
  }
}

function openLightbox(key) {
  let overlay = document.getElementById('photoLightbox');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'photoLightbox';
    overlay.className = 'photo-lightbox';
    overlay.innerHTML = '<div class="photo-lightbox-close">&times;</div><img class="photo-lightbox-img">';
    overlay.addEventListener('click', () => { overlay.style.display = 'none'; });
    document.body.appendChild(overlay);
  }
  const img = overlay.querySelector('img');
  img.src = '';
  overlay.style.display = 'flex';
  loadAuthImage(img, key);
}
</script>
</body>
</html>
