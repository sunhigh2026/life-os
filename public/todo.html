<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo - Life OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-pia.png">
  <meta name="theme-color" content="#FFFCF0">
  <style>
    .group-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      padding: 12px 16px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .group-header .badge {
      background: var(--border);
      color: var(--text-main);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 500;
    }
    .overdue-header { color: #c53030; }
    .delete-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; opacity: 0.35; flex-shrink: 0; border-radius: 6px; }
    .delete-btn:hover { opacity: 1; background: #fff0f0; }
    .cat-badge { font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-right: 4px; }
    .cat-must { background: #fff0f0; color: #c53030; }
    .cat-want { background: #f5f0ff; color: #7c3aed; }
    .decompose-btn { background: none; border: none; font-size: 14px; cursor: pointer; padding: 2px 4px; opacity: 0.5; flex-shrink: 0; }
    .decompose-btn:hover { opacity: 1; }
    .subtask-list { margin-left: 24px; padding: 4px 0; border-left: 2px solid var(--border); }
    .subtask-count { font-size: 10px; color: var(--text-sub); background: var(--border); border-radius: 8px; padding: 1px 6px; margin-left: 4px; }
    .expand-btn { background: none; border: none; font-size: 13px; cursor: pointer; padding: 2px 4px; color: var(--text-sub); transition: transform 0.2s; flex-shrink: 0; }
    .expand-btn.open { transform: rotate(90deg); }
    .subtask-wrapper { display: none; }
    .subtask-wrapper.open { display: block; }
    .subtask-todo { margin-left: 12px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .subtask-todo:last-child { border-bottom: none; }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- ビュー切替 -->
  <div class="filter-tabs">
    <button class="filter-tab active" id="tab-smart" onclick="setView('smart')">🤖 AI整理</button>
    <button class="filter-tab" id="tab-all" onclick="setView('all')">すべて</button>
    <button class="filter-tab" id="tab-done" onclick="setView('done')">完了済み</button>
  </div>

  <!-- Todoリスト -->
  <div id="todoList" class="dashboard" style="padding-top:4px;"></div>

</div>

<!-- Todo編集モーダル -->
<div id="todoEditModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:12px;">
    <div style="font-weight:600;font-size:15px;">ToDoを編集</div>
    <input type="hidden" id="todoEditId">
    <input type="text" id="todoEditText" placeholder="タスク内容">
    <input type="text" id="todoEditTag" placeholder="タグ（任意）">
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:12px;color:var(--muted);">期限:</span>
      <input type="date" id="todoEditDue" style="flex:1;">
    </div>
    <div style="display:flex;gap:6px;">
      <button class="priority-btn todo-edit-priority" data-priority="high" onclick="selectEditPriority('high')">🔴 高</button>
      <button class="priority-btn todo-edit-priority" data-priority="mid" onclick="selectEditPriority('mid')">🟡 普通</button>
      <button class="priority-btn todo-edit-priority" data-priority="low" onclick="selectEditPriority('low')">🔵 低</button>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="category-btn todo-edit-category" data-category="must" onclick="selectEditCategory('must')" style="flex:1;padding:6px 10px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:12px;">🔥 Must</button>
      <button class="category-btn todo-edit-category" data-category="want" onclick="selectEditCategory('want')" style="flex:1;padding:6px 10px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:12px;">💫 Want</button>
      <button class="category-btn todo-edit-category selected" data-category="" onclick="selectEditCategory('')" style="flex:1;padding:6px 10px;border:2px solid var(--accent);border-radius:10px;background:#eaf3ff;cursor:pointer;font-size:12px;">なし</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-submit todo-mode" onclick="saveEdit()">保存</button>
      <button class="btn-submit" onclick="closeEdit()" style="background:#aaa;">キャンセル</button>
    </div>
  </div>
</div>

<!-- タスク分解モーダル -->
<div id="decomposeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:12px;">
    <div style="font-weight:600;font-size:15px;">🧩 タスク分解</div>
    <div id="decomposeOriginal" style="font-size:13px;color:var(--muted);"></div>
    <div id="decomposeResult" style="display:flex;flex-direction:column;gap:6px;"></div>
    <div id="decomposeComment" style="font-size:12px;color:#e91e8a;"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-submit todo-mode" id="decomposeAddBtn" onclick="addDecomposedTasks()" style="display:none;">すべて追加</button>
      <button class="btn-submit" onclick="closeDecompose()" style="background:#aaa;">閉じる</button>
    </div>
  </div>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a href="/" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home
  </a>
  <a href="/todo.html" class="tab-item active">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>ToDo
  </a>
  <a href="/history.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>日記
  </a>
  <a href="/books.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>読書
  </a>
  <a href="/chat.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Chat

</nav>

<a href="https://docs.google.com/spreadsheets/d/1TJ6Q6tHzxz7fN4PxbMD7fWMVIW6eyoxKYiyeXKgz35w/edit" class="sheets-fab" target="_blank" rel="noopener" title="Google スプレッドシートで見る">📊</a>

<div id="toast"></div>

<script>
const AUTH_KEY = 'hidapia2026';
let currentView = 'smart';
let allTodos = [];
let aiSuggestions = null;
let aiSuggestCachedAt = 0; // キャッシュ時刻（ms）
const AI_CACHE_TTL = 5 * 60 * 1000; // 5分キャッシュ
let decomposedTasks = [];
let decomposeSourceId = null;
let expandedParents = new Set(); // 展開中の親タスクID

document.addEventListener('DOMContentLoaded', () => load());

async function apiFetch(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH_KEY}`, ...(options.headers || {}) };
  const res = await fetch(path, { ...options, headers });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
  return res.json();
}

async function load() {
  try {
    const data = await apiFetch('/api/todo?status=all');
    allTodos = data.todos;
    // AI提案を並行取得（失敗しても続行）
    if (currentView === 'smart') {
      loadAiSuggest();
    }
    render();
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  }
}

async function loadAiSuggest(force = false) {
  // キャッシュが有効ならスキップ
  if (!force && aiSuggestions && (Date.now() - aiSuggestCachedAt < AI_CACHE_TTL)) {
    if (currentView === 'smart') render();
    return;
  }
  try {
    aiSuggestions = await apiFetch('/api/todo-suggest');
    aiSuggestCachedAt = Date.now();
  } catch (_) {
    aiSuggestions = null;
  }
  if (currentView === 'smart') render();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${v}`).classList.add('active');
  if (v === 'smart') loadAiSuggest(); // キャッシュ有効なら即表示
  render();
}

function render() {
  const el = document.getElementById('todoList');
  const today = new Date().toISOString().slice(0, 10);

  // サブタスクマップを構築
  const subtaskMap = {}; // parent_id → [subtasks]
  allTodos.forEach(t => {
    if (t.parent_id) {
      if (!subtaskMap[t.parent_id]) subtaskMap[t.parent_id] = [];
      subtaskMap[t.parent_id].push(t);
    }
  });

  // トップレベルのみ（parent_idがないもの）
  const topLevel = allTodos.filter(t => !t.parent_id);

  if (currentView === 'done') {
    const done = topLevel.filter(t => t.status === 'done').slice(0, 20);
    if (!done.length) { el.innerHTML = '<div class="empty-msg" style="padding:32px 0;">完了したToDoはありません</div>'; return; }
    el.innerHTML = `<div class="section"><div class="section-body">${done.map(t => renderTodoItem(t, today, true, subtaskMap)).join('')}</div></div>`;
    return;
  }

  if (currentView === 'all') {
    const open = topLevel.filter(t => t.status === 'open');
    if (!open.length) {
      el.innerHTML = `<div class="empty-state">
        <img src="/pia-full-2.png" alt="ピアちゃん" class="pia-icon-lg" onerror="this.src='/icon-pia.png'">
        <p>ToDoはないよ！<br>のんびりしよ〜🌸</p>
      </div>`;
      return;
    }
    el.innerHTML = `<div class="section"><div class="section-body">${open.map(t => renderTodoItem(t, today, false, subtaskMap)).join('')}</div></div>`;
    return;
  }

  // === AI整理ビュー ===
  const open = topLevel.filter(t => t.status === 'open');
  if (!open.length) {
    el.innerHTML = `<div class="empty-state">
      <img src="/pia-full-2.png" alt="ピアちゃん" class="pia-icon-lg" onerror="this.src='/icon-pia.png'">
      <p>やることはないよ！<br>のんびりしよ〜🌸</p>
    </div>`;
    return;
  }

  // 週の計算
  const todayDate = new Date(today);
  const weekEnd = new Date(today);
  weekEnd.setDate(weekEnd.getDate() + (7 - weekEnd.getDay())); // 次の日曜
  const weekEndStr = weekEnd.toISOString().slice(0, 10);

  // グループ分け
  const overdue = open.filter(t => t.due && t.due < today);
  const thisWeek = open.filter(t => t.due && t.due >= today && t.due <= weekEndStr && !overdue.includes(t));
  const later = open.filter(t => t.due && t.due > weekEndStr);
  const noDue = open.filter(t => !t.due);

  let html = '';

  // AI おすすめ
  const piaNormal = '/pia-normal.png';
  const piaThinking = '/pia-thinking.png';
  if (aiSuggestions) {
    const suggestedIds = new Set(aiSuggestions.suggestions || []);
    const suggested = open.filter(t => suggestedIds.has(t.id));
    if (suggested.length) {
      html += `<div class="ai-suggest-card">
        <div class="ai-msg">
          <img src="${piaNormal}" class="ai-msg-pia" alt="ピア" onerror="this.src='/icon-pia.png'">
          ${escHtml(aiSuggestions.message || '今日のおすすめだよ〜！')}
        </div>
        ${suggested.map(t => renderTodoItem(t, today, false, subtaskMap)).join('')}
      </div>`;
    } else if (aiSuggestions.message) {
      html += `<div class="ai-suggest-card"><div class="ai-msg">
        <img src="${piaNormal}" class="ai-msg-pia" alt="ピア" onerror="this.src='/icon-pia.png'">
        ${escHtml(aiSuggestions.message)}
      </div></div>`;
    }
  } else {
    html += `<div class="ai-suggest-card"><div class="ai-msg">
      <img src="${piaThinking}" class="ai-msg-pia" alt="ピア" onerror="this.src='/icon-pia.png'">
      考え中...
    </div></div>`;
  }

  // 期限超過
  if (overdue.length) {
    html += `<div class="group-header overdue-header">🚨 期限超過 <span class="badge" style="background:#fed7d7;color:#e53e3e;">${overdue.length}</span></div>`;
    html += overdue.map(t => renderTodoItem(t, today, false, subtaskMap)).join('');
  }

  // 今週やること
  if (thisWeek.length) {
    html += `<div class="group-header">📅 今週やること <span class="badge">${thisWeek.length}</span></div>`;
    html += thisWeek.map(t => renderTodoItem(t, today, false, subtaskMap)).join('');
  }

  // 来週以降
  if (later.length) {
    html += `<div class="group-header">📆 来週以降 <span class="badge">${later.length}</span></div>`;
    html += later.map(t => renderTodoItem(t, today, false, subtaskMap)).join('');
  }

  // いつかやる
  if (noDue.length) {
    html += `<div class="group-header">💭 いつかやる <span class="badge">${noDue.length}</span></div>`;
    html += noDue.map(t => renderTodoItem(t, today, false, subtaskMap)).join('');
  }

  // 最近の完了
  const recentDone = topLevel.filter(t => t.status === 'done').slice(0, 5);
  if (recentDone.length) {
    html += `<div class="group-header">✅ 最近の完了</div>`;
    html += recentDone.map(t => renderTodoItem(t, today, true, subtaskMap)).join('');
  }

  el.innerHTML = html;
}

function renderTodoItem(t, today, showDone = false, subtaskMap = {}) {
  const overdue = t.due && t.due < today && t.status !== 'done';
  const priority = t.priority || 'mid';
  const priorityLabel = { high: '高', mid: '普通', low: '低' }[priority];
  const isDone = t.status === 'done';
  const td = encodeURIComponent(JSON.stringify(t));
  const categoryBadge = t.category === 'must' ? '<span class="cat-badge cat-must">🔥Must</span>'
    : t.category === 'want' ? '<span class="cat-badge cat-want">💫Want</span>'
    : '';

  const subtasks = subtaskMap[t.id] || [];
  const hasSubtasks = subtasks.length > 0;
  const isExpanded = expandedParents.has(t.id);
  const doneSubCount = subtasks.filter(s => s.status === 'done').length;

  let html = `<div class="todo-item-wrapper">
    <div class="todo-item${overdue ? ' overdue-item' : ''}" style="${isDone ? 'opacity:0.6;' : ''}">
      ${hasSubtasks ? `<button class="expand-btn ${isExpanded ? 'open' : ''}" onclick="event.stopPropagation();toggleSubtasks('${t.id}')">▶</button>` : ''}
      <div class="todo-check ${isDone ? 'checked' : ''}"
        onclick="${isDone ? `reopenTodo('${t.id}')` : `completeTodo('${t.id}', this.closest('.todo-item'))`}"
        title="${isDone ? '復帰' : '完了'}">
        ${isDone ? '✅' : ''}
      </div>
      <div class="todo-content">
        <div class="todo-text" style="${isDone ? 'text-decoration:line-through;' : ''}">${categoryBadge}${escHtml(t.text)}${hasSubtasks ? `<span class="subtask-count">${doneSubCount}/${subtasks.length}</span>` : ''}</div>
        <div class="todo-meta ${overdue ? 'overdue' : ''}">
          ${t.due ? `📅 ${t.due}${overdue ? ' 期限超過！' : ''}` : ''}
          ${t.tag ? ` #${t.tag}` : ''}
          ${isDone && t.done_at ? ` ✅ ${t.done_at.slice(0, 10)}` : ''}
        </div>
      </div>
      ${!isDone ? `<button class="decompose-btn" onclick="event.stopPropagation();decomposeTodo('${t.id}','${escAttr(t.text)}')" title="タスク分解">🧩</button>` : ''}
      ${!isDone ? `<div class="priority-badge ${priority}"><span class="priority-dot"></span>${priorityLabel}</div>` : ''}
      ${!isDone ? `<button class="edit-btn" onclick="event.stopPropagation();openEdit(decodeURIComponent('${td}'))" title="編集">✏️</button>` : ''}
      <button class="delete-btn" onclick="deleteTodo('${t.id}')" title="削除">🗑</button>
    </div>`;

  // サブタスク表示
  if (hasSubtasks) {
    html += `<div class="subtask-wrapper ${isExpanded ? 'open' : ''}" id="subtasks-${t.id}">
      <div class="subtask-list">
        ${subtasks.map(st => {
          const stDone = st.status === 'done';
          return `<div class="subtask-todo" style="${stDone ? 'opacity:0.5;' : ''}">
            <div style="display:flex;align-items:center;gap:6px;">
              <div class="todo-check ${stDone ? 'checked' : ''}" style="width:18px;height:18px;min-width:18px;border-width:1.5px;"
                onclick="${stDone ? `reopenTodo('${st.id}')` : `completeSubtask('${st.id}','${t.id}')`}">
                ${stDone ? '✅' : ''}
              </div>
              <span style="font-size:12px;${stDone ? 'text-decoration:line-through;color:var(--muted);' : ''}">${escHtml(st.text)}</span>
              ${st.due ? `<span style="font-size:10px;color:var(--muted);margin-left:auto;">📅${st.due}</span>` : ''}
              <button class="delete-btn" style="font-size:12px;padding:2px;" onclick="deleteSubtask('${st.id}')" title="削除">🗑</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html += `</div>`;
  return html;
}

// ==============================
// タスク分解
// ==============================
async function decomposeTodo(id, text) {
  decomposeSourceId = id;
  const modal = document.getElementById('decomposeModal');
  const result = document.getElementById('decomposeResult');
  const comment = document.getElementById('decomposeComment');
  const addBtn = document.getElementById('decomposeAddBtn');

  document.getElementById('decomposeOriginal').textContent = `元タスク: ${text}`;
  result.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;">🐾 分解中...</div>';
  comment.textContent = '';
  addBtn.style.display = 'none';
  modal.style.display = 'flex';

  try {
    const data = await apiFetch('/api/todo-decompose', {
      method: 'POST',
      body: JSON.stringify({ id, text }),
    });

    decomposedTasks = data.subtasks || [];
    // デバッグ情報があれば表示（開発用）
    const debugInfo = data._debug ? `<div style="font-size:10px;color:#999;margin-top:4px;">debug: ${escHtml(data._debug)}${data._raw ? ' | raw: ' + escHtml(data._raw.slice(0,100)) : ''}</div>` : '';

    if (decomposedTasks.length) {
      result.innerHTML = decomposedTasks.map((st, i) => `
        <label style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#f8f8f8;border-radius:8px;">
          <input type="checkbox" class="decompose-check" data-idx="${i}" checked>
          <span style="flex:1;font-size:13px;">${escHtml(st.text)}</span>
          ${st.due ? `<span style="font-size:11px;color:var(--muted);">📅${st.due}</span>` : ''}
        </label>
      `).join('') + debugInfo;
      addBtn.style.display = '';
    } else {
      result.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;">分解できませんでした</div>' + debugInfo;
    }

    if (data.comment) {
      comment.textContent = `🐾 ${data.comment}`;
    }
  } catch (e) {
    result.innerHTML = `<div style="color:#e53e3e;font-size:13px;">エラー: ${e.message}</div>`;
  }
}

async function addDecomposedTasks() {
  const checks = document.querySelectorAll('.decompose-check');
  const selected = [];
  checks.forEach(c => {
    if (c.checked) selected.push(decomposedTasks[parseInt(c.dataset.idx)]);
  });

  if (!selected.length) { showToast('追加するタスクを選んでね'); return; }

  const source = allTodos.find(t => t.id === decomposeSourceId);
  const datetime = new Date().toISOString().slice(0, 19);
  let added = 0;

  for (const st of selected) {
    try {
      await apiFetch('/api/todo', {
        method: 'POST',
        body: JSON.stringify({
          datetime,
          text: st.text,
          tag: source?.tag || null,
          priority: source?.priority || 'mid',
          due: st.due || null,
          category: source?.category || null,
          parent_id: decomposeSourceId, // 親タスクに紐付け
        }),
      });
      added++;
    } catch (_) {}
  }

  // 追加後、親を自動展開
  if (decomposeSourceId) expandedParents.add(decomposeSourceId);

  showToast(`✅ ${added}件のサブタスクを追加しました`);
  closeDecompose();
  await load();
}

// ==============================
// サブタスク操作
// ==============================
function toggleSubtasks(parentId) {
  if (expandedParents.has(parentId)) {
    expandedParents.delete(parentId);
  } else {
    expandedParents.add(parentId);
  }
  // DOM直接操作で高速切替
  const wrapper = document.getElementById(`subtasks-${parentId}`);
  const btn = wrapper?.previousElementSibling?.querySelector('.expand-btn');
  if (wrapper) wrapper.classList.toggle('open');
  if (btn) btn.classList.toggle('open');
}

async function completeSubtask(id, parentId) {
  try {
    await apiFetch('/api/todo', { method: 'PUT', body: JSON.stringify({ id, status: 'done' }) });
    showToast('✅ 完了！');
    // 展開状態を保持して再描画
    expandedParents.add(parentId);
    await load();
  } catch (e) { showToast(`エラー: ${e.message}`); }
}

async function deleteSubtask(id) {
  if (!confirm('このサブタスクを削除しますか？')) return;
  try {
    await apiFetch(`/api/todo?id=${id}`, { method: 'DELETE' });
    showToast('🗑 削除しました');
    await load();
  } catch (e) { showToast(`エラー: ${e.message}`); }
}

function closeDecompose() {
  document.getElementById('decomposeModal').style.display = 'none';
  decomposedTasks = [];
  decomposeSourceId = null;
}

// ==============================
// 完了・復帰・削除
// ==============================
async function completeTodo(id, el) {
  el.style.opacity = '0.5';
  try {
    await apiFetch('/api/todo', { method: 'PUT', body: JSON.stringify({ id, status: 'done' }) });
    showToast('✅ 完了！');
    aiSuggestCachedAt = 0; // キャッシュ無効化
    await load();
  } catch (e) { el.style.opacity = '1'; showToast(`エラー: ${e.message}`); }
}

async function reopenTodo(id) {
  try {
    await apiFetch('/api/todo', { method: 'PUT', body: JSON.stringify({ id, status: 'open' }) });
    showToast('↩ 復帰しました');
    await load();
  } catch (e) { showToast(`エラー: ${e.message}`); }
}

async function deleteTodo(id) {

  try {
    await apiFetch(`/api/todo?id=${id}`, { method: 'DELETE' });

// ==============================
// 編集モーダル
// ==============================
function openEdit(todoJson) {
  const t = JSON.parse(todoJson);
  document.getElementById('todoEditId').value = t.id;
  document.getElementById('todoEditText').value = t.text || '';
  document.getElementById('todoEditTag').value = t.tag || '';
  document.getElementById('todoEditDue').value = t.due || '';
  document.querySelectorAll('.todo-edit-priority').forEach(b => {
    b.classList.toggle('selected', b.dataset.priority === (t.priority || 'mid'));
  });
  selectEditCategory(t.category || '');
  document.getElementById('todoEditModal').style.display = 'flex';
}

function closeEdit() { document.getElementById('todoEditModal').style.display = 'none'; }

function selectEditPriority(p) {
  document.querySelectorAll('.todo-edit-priority').forEach(b => {
    b.classList.toggle('selected', b.dataset.priority === p);
  });
}

function selectEditCategory(c) {
  document.querySelectorAll('.todo-edit-category').forEach(btn => {
    const match = btn.dataset.category === c;
    btn.classList.toggle('selected', match);
    btn.style.borderColor = match ? 'var(--accent)' : 'var(--border)';
    btn.style.background = match ? '#eaf3ff' : 'var(--bg)';
  });
}

async function saveEdit() {
  const id = document.getElementById('todoEditId').value;
  const text = document.getElementById('todoEditText').value.trim();
  const tag = document.getElementById('todoEditTag').value.trim() || null;
  const due = document.getElementById('todoEditDue').value || null;
  const priority = document.querySelector('.todo-edit-priority.selected')?.dataset.priority || 'mid';
  const category = document.querySelector('.todo-edit-category.selected')?.dataset.category || null;
  try {
    await apiFetch('/api/todo', { method: 'PUT', body: JSON.stringify({ id, text, tag, due, priority, category }) });
    showToast('✅ 更新しました');
    closeEdit();
    await load();
  } catch (e) { showToast(`エラー: ${e.message}`); }
}

// ==============================
// ユーティリティ
// ==============================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
