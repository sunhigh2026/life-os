<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-pia.png">
  <meta name="theme-color" content="#F5FBF8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
<div class="app-wrapper">

  <!-- 入力エリア -->
  <div class="input-area">
    <!-- 日時 -->
    <div class="row datetime-row">
      <input type="datetime-local" id="datetimeInput">
      <button class="btn-now" onclick="setNow()">今</button>
    </div>

    <!-- テキスト入力 -->
    <div class="text-input-row">
      <textarea id="textInput" placeholder="メモを入力…（改行OK）" autocomplete="off" autofocus rows="2"
        style="resize:vertical;font-family:inherit;font-size:14px;flex:1;border:1px solid var(--border);border-radius:10px;padding:8px 12px;min-height:40px;"
        oninput="onTextInput()"></textarea>
      <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()" title="音声入力">🎤</button>
    </div>

    <!-- AI分類ヒント -->
    <div id="aiClassifyHint" style="display:none;font-size:12px;color:#e91e8a;background:#fff0f5;padding:6px 10px;border-radius:8px;text-align:center;"></div>

    <!-- モード切替 -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="diaryBtn" onclick="setMode('diary')">📝 日記</button>
      <button class="mode-btn" id="todoBtn" onclick="setMode('todo')">☑ ToDo</button>
    </div>

    <!-- タグ -->
    <div class="tag-area">
      <div class="tag-row">
        <input type="text" id="tagInput" placeholder="タグ（任意）" autocomplete="off" oninput="onTagInput()">
        <div id="tagDropdown" class="tag-dropdown" style="display:none;"></div>
      </div>
      <div class="tag-suggestions" id="tagSuggestions"></div>
    </div>

    <!-- 日記: mood -->
    <div class="mood-row" id="moodRow">
      <span class="mood-label">気分:</span>
      <div class="mood-btns">
        <button class="mood-btn" data-mood="1" onclick="selectMood(1)">😢</button>
        <button class="mood-btn" data-mood="2" onclick="selectMood(2)">😞</button>
        <button class="mood-btn" data-mood="3" onclick="selectMood(3)">😐</button>
        <button class="mood-btn" data-mood="4" onclick="selectMood(4)">🙂</button>
        <button class="mood-btn" data-mood="5" onclick="selectMood(5)">😊</button>
        <button class="mood-btn" data-mood="6" onclick="selectMood(6)">🤩</button>
      </div>
    </div>

    <!-- ToDo: 期限・優先度・分類 -->
    <div class="todo-options" id="todoOptions" style="display:none;">
      <input type="date" id="dueDate" title="期限日">
      <div class="priority-btns">
        <button class="priority-btn" data-priority="high" onclick="selectPriority('high')">🔴 高</button>
        <button class="priority-btn selected" data-priority="mid" onclick="selectPriority('mid')">🟡 普通</button>
        <button class="priority-btn" data-priority="low" onclick="selectPriority('low')">🔵 低</button>
      </div>
      <div class="category-btns" style="display:flex;gap:4px;width:100%;margin-top:2px;">
        <button class="category-btn" data-category="must" onclick="selectCategory('must')" style="flex:1;padding:6px 10px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:12px;transition:all 0.15s;">🔥 Must</button>
        <button class="category-btn" data-category="want" onclick="selectCategory('want')" style="flex:1;padding:6px 10px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:12px;transition:all 0.15s;">💫 Want</button>
        <button class="category-btn selected" data-category="" onclick="selectCategory('')" style="flex:1;padding:6px 10px;border:2px solid var(--accent);border-radius:10px;background:#eaf3ff;cursor:pointer;font-size:12px;transition:all 0.15s;">なし</button>
      </div>
    </div>

    <!-- 記録ボタン -->
    <button class="btn-submit" id="submitBtn" onclick="submit()">記録する</button>
  </div>

  <!-- ダッシュボード -->
  <div class="dashboard" id="dashboard">
    <!-- 日次概要カード（ピアちゃんコメント付き） -->
    <div id="dailySummaryCard" class="daily-summary-card" style="display:none;"></div>

    <!-- 今日の予定（Googleカレンダー） -->
    <div class="section" id="sectionCalendar" style="display:none;">
      <div class="section-header">📅 今日の予定 <span id="calendarCount" style="color:var(--muted);font-weight:400;font-size:12px;"></span></div>
      <div class="section-body" id="calendarList"></div>
    </div>

    <!-- 今日の記録 -->
    <div class="section" id="sectionToday">
      <div class="section-header">📝 今日の記録 <span id="todayCount" style="color:var(--muted);font-weight:400;font-size:12px;"></span></div>
      <div class="section-body" id="todayList"></div>
    </div>

    <!-- やること -->
    <div class="section" id="sectionTodo">
      <div class="section-header">☑ やること <span id="todoCount" style="color:var(--muted);font-weight:400;font-size:12px;"></span></div>
      <div class="section-body" id="todoList"></div>
    </div>

    <!-- 最近の完了 -->
    <div class="section" id="sectionDone">
      <div class="section-header">✅ 最近の完了</div>
      <div class="section-body" id="doneList"></div>
    </div>

    <!-- フィットネス -->
    <div class="section" id="sectionFitness" style="display:none;">
      <div class="section-header">🏃 フィットネス <span style="font-size:11px;color:var(--text-sub);font-weight:400;">直近7日</span></div>
      <div id="fitnessInfo"></div>
    </div>

    <!-- 生理周期予測 -->
    <div class="section" id="sectionMenstrual" style="display:none;">
      <div class="section-body" id="menstrualInfo" style="font-size:12px;color:var(--muted);padding:4px 0;"></div>
    </div>

    <!-- 目標 -->
    <div class="section" id="sectionGoals" style="display:none;">
      <div class="section-header" style="display:flex;justify-content:space-between;align-items:center;">
        🎯 目標
        <a href="/chat.html" onclick="localStorage.setItem('chatAutoMsg','目標の進捗はどう？達成に向けてアドバイスして')" style="font-size:11px;color:var(--accent);text-decoration:none;">🐾 アドバイス</a>
      </div>
      <div class="section-body" id="goalList"></div>
    </div>

    <!-- ストリーク -->
    <div class="section">
      <div class="section-header">🔥 30日ストリーク</div>
      <div class="streak-grid" id="streakGrid"></div>
    </div>

    <!-- 設定リンク -->
    <div style="text-align:center;padding:12px 0;">
      <a href="/settings.html" style="font-size:12px;color:var(--muted);text-decoration:none;">⚙️ 設定・エクスポート・インポート</a>
    </div>
  </div>

</div>

<!-- タブバー -->

  <a href="/" class="tab-item active">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home

  <a href="/todo.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>ToDo

  <a href="/history.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>日記
  </a>
  <a href="/books.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>読書
  </a>
  <a href="/chat.html" class="tab-item">

  </a>
</nav>

<!-- Todo編集モーダル -->
<div id="todoEditModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:12px;">
    <div style="font-weight:600;font-size:15px;">ToDoを編集</div>
    <input type="hidden" id="todoEditId">
    <input type="text" id="todoEditText" placeholder="タスク内容">
    <input type="text" id="todoEditTag" placeholder="タグ（任意）">
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:12px;color:var(--muted);">期限:</span>
      <input type="date" id="todoEditDue" style="flex:1;">
    </div>
    <div style="display:flex;gap:6px;">
      <button class="priority-btn todo-edit-priority selected" data-priority="high" onclick="selectTodoEditPriority('high')">🔴 高</button>
      <button class="priority-btn todo-edit-priority selected" data-priority="mid" onclick="selectTodoEditPriority('mid')">🟡 普通</button>
      <button class="priority-btn todo-edit-priority" data-priority="low" onclick="selectTodoEditPriority('low')">🔵 低</button>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="category-btn todo-edit-category" data-category="must" onclick="selectTodoEditCategory('must')" style="flex:1;padding:6px 10px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:12px;">🔥 Must</button>
      <button class="category-btn todo-edit-category" data-category="want" onclick="selectTodoEditCategory('want')" style="flex:1;padding:6px 10px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:12px;">💫 Want</button>
      <button class="category-btn todo-edit-category selected" data-category="" onclick="selectTodoEditCategory('')" style="flex:1;padding:6px 10px;border:2px solid var(--accent);border-radius:10px;background:#eaf3ff;cursor:pointer;font-size:12px;">なし</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-submit todo-mode" onclick="saveTodoEdit()">保存</button>
      <button class="btn-submit" onclick="closeTodoEdit()" style="background:#aaa;">キャンセル</button>
    </div>
  </div>
</div>

<!-- FABボタン -->
<a href="/settings.html" class="settings-fab" title="設定">⚙️</a>
<a href="https://docs.google.com/spreadsheets/d/1TJ6Q6tHzxz7fN4PxbMD7fWMVIW6eyoxKYiyeXKgz35w/edit" class="sheets-fab" target="_blank" rel="noopener" title="Google スプレッドシートで見る">📊</a>

<!-- トースト -->
<div id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
