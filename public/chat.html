<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIチャット - Life OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-pia.png">
  <meta name="theme-color" content="#F5FBF8">
</head>
<body>
<div class="app-wrapper" style="padding-bottom:140px;">

  <!-- ピアちゃんヘッダー（フルボディ表示・耳まで見える） -->
  <div class="chat-char-header" id="chatHeader">
    <img src="/pia-full-1.png" class="chat-pia-full" id="chatPiaImg" alt="ピアちゃん"
         onerror="this.src='/pia-normal.png'">
    <div style="padding-bottom:4px;">
      <div class="chat-char-name" id="chatHeaderName">ピアちゃん</div>
      <div class="chat-char-sub">AIアシスタント 🐾</div>
    </div>
    <!-- 後方互換用（initCharacter()が参照） -->
    <span id="chatHeaderIcon" style="display:none;"></span>
  </div>

  <!-- クイックボタン -->
  <div class="quick-btns" style="padding-top:8px;flex-wrap:wrap;">
    <button class="quick-btn" onclick="sendQuick('今日何やる？')">今日何やる？</button>
    <button class="quick-btn" onclick="sendQuick('最近の振り返りして')">振り返り</button>
    <button class="quick-btn" onclick="sendQuick('先月の読書量は？')">先月の読書</button>
    <button class="quick-btn" onclick="sendQuick('今の気分に合う本は？')">本のおすすめ</button>
    <button class="quick-btn" onclick="sendQuick('明日の予定は？')">明日の予定</button>
    <button class="quick-btn" onclick="sendQuick('mood傾向を分析して。曜日別、予定の多さ、運動量との関係も見て')">mood分析</button>
    <button class="quick-btn" onclick="sendQuick('今週の運動量どう？')">運動チェック</button>
    <button class="quick-btn" onclick="sendQuick('目標の進捗はどう？')">目標チェック</button>
  </div>

  <!-- メッセージ一覧 -->
  <div class="chat-messages" id="chatMessages">
    <div class="message ai" id="greetingMsg">やっほ〜！ピアだよ🐾<br>なんでも聞いてね〜 日記・ToDo・読書のことを一緒に考えるよ！</div>
  </div>

  <!-- 入力エリア -->
  <div class="chat-input-area" style="position:fixed;bottom:72px;left:0;right:0;max-width:520px;margin:0 auto;">
    <input type="text" id="chatInput" placeholder="メッセージを入力…"
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
    <button class="btn-voice" id="chatVoiceBtn" onclick="toggleChatVoice()" title="音声入力"
            style="position:static;transform:none;font-size:18px;">🎤</button>
    <button class="btn-send" onclick="sendMessage()">➤</button>
  </div>

</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a href="/" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home
  </a>
  <a href="/todo.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>ToDo
  </a>
  <a href="/history.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>日記
  </a>
  <a href="/books.html" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>読書
  </a>
  <a href="/chat.html" class="tab-item active">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Chat
  </a>
</nav>


<div id="toast"></div>

<script src="/chat.js"></script>
</body>
</html>
