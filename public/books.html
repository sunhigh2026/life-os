<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読書記録 - Life OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-pia.png">
  <meta name="theme-color" content="#F5FBF8">
</head>
<body>
<div class="app-wrapper">

  <!-- 検索エリア -->
  <div class="search-area">
    <div class="row">
      <input type="text" id="searchInput" placeholder="タイトルまたはISBNで検索…" autocomplete="off"
             onkeydown="if(event.key==='Enter')searchBooks()">
      <button class="btn-now" onclick="searchBooks()">検索</button>
      <button class="btn-now" id="scanBtn" onclick="toggleScan()" style="background:#4a9eff;">📷</button>
    </div>
    <div id="scannerArea" style="display:none;">
      <div id="qr-reader" style="width:100%;border-radius:12px;overflow:hidden;"></div>
      <button class="btn-now" onclick="stopScan()" style="background:#ff6b6b;width:100%;margin-top:8px;">スキャン停止</button>
    </div>
  </div>

  <!-- 検索結果 -->
  <div id="searchResults" class="book-list" style="display:none;"></div>

  <!-- 登録フォーム -->
  <div id="registerArea" class="book-list" style="display:none;">
    <div class="register-form">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div id="formCover"></div>
        <div style="flex:1;">
          <div style="font-weight:600;font-size:15px;" id="formTitle"></div>
          <div style="color:var(--muted);font-size:13px;" id="formAuthor"></div>
          <div style="color:var(--muted);font-size:12px;" id="formIsbn"></div>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">媒体</div>
        <div class="medium-btns">
          <button class="option-btn selected" data-medium="owned" onclick="selectMedium('owned')">📖 蔵書</button>
          <button class="option-btn" data-medium="library" onclick="selectMedium('library')">🏛 図書館</button>
          <button class="option-btn" data-medium="kindle" onclick="selectMedium('kindle')">📱 Kindle</button>
          <button class="option-btn" data-medium="audible" onclick="selectMedium('audible')">🎧 Audible</button>
          <button class="option-btn" data-medium="other" onclick="selectMedium('other')">その他</button>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">ステータス</div>
        <div class="status-btns">
          <button class="option-btn" data-status="want" onclick="selectStatus('want')">📌 読みたい</button>
          <button class="option-btn" data-status="reading" onclick="selectStatus('reading')">📖 読書中</button>
          <button class="option-btn selected" data-status="done" onclick="selectStatus('done')">✅ 読了</button>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">読了日</div>
        <input type="date" id="endDateInput">
      </div>

      <div class="form-group">
        <div class="form-label">タグ</div>
        <input type="text" id="bookTagInput" placeholder="タグ（任意）">
      </div>

      <div class="form-group">
        <div class="form-label">評価</div>
        <div class="star-input" id="starInput">
          <button class="star-btn" data-star="1" onclick="selectStar(1)">★</button>
          <button class="star-btn" data-star="2" onclick="selectStar(2)">★</button>
          <button class="star-btn" data-star="3" onclick="selectStar(3)">★</button>
          <button class="star-btn" data-star="4" onclick="selectStar(4)">★</button>
          <button class="star-btn" data-star="5" onclick="selectStar(5)">★</button>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">感想・メモ</div>
        <div style="position:relative;">
          <textarea id="noteInput" rows="3" placeholder="感想（任意）" style="width:100%;resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:10px;padding:8px 12px;"></textarea>
          <button class="btn-voice" id="noteVoiceBtn" onclick="toggleNoteVoice()" title="音声入力" style="position:absolute;right:8px;top:8px;">🎤</button>
        </div>
      </div>

      <button class="btn-submit" onclick="registerBook()">📚 登録する</button>
      <button class="btn-submit" onclick="cancelRegister()"
              style="background:#aaa;margin-top:4px;">キャンセル</button>
    </div>
  </div>

  <!-- ステータスフィルター -->
  <div class="filter-tabs" id="bookFilterTabs">
    <button class="filter-tab active" id="book-tab-all"     onclick="setBookFilter('all')">すべて</button>
    <button class="filter-tab"        id="book-tab-want"    onclick="setBookFilter('want')">📌 読みたい</button>
    <button class="filter-tab"        id="book-tab-reading" onclick="setBookFilter('reading')">📖 読書中</button>
    <button class="filter-tab"        id="book-tab-done"    onclick="setBookFilter('done')">✅ 読了</button>
  </div>

  <!-- 媒体フィルター -->
  <div class="filter-tabs" id="mediumFilterTabs" style="margin-top:4px;">
    <button class="filter-tab active" id="medium-tab-all"     onclick="setMediumFilter('all')">全媒体</button>
    <button class="filter-tab"        id="medium-tab-owned"   onclick="setMediumFilter('owned')">📖 蔵書</button>
    <button class="filter-tab"        id="medium-tab-library" onclick="setMediumFilter('library')">🏛 図書館</button>
    <button class="filter-tab"        id="medium-tab-kindle"  onclick="setMediumFilter('kindle')">📱 Kindle</button>
    <button class="filter-tab"        id="medium-tab-Audible" onclick="setMediumFilter('Audible')">🎧 Audible</button>
  </div>

  <!-- ソート＆検索 -->
  <div style="display:flex;gap:8px;margin:8px 0;align-items:center;">
    <select id="bookSort" onchange="loadRecentBooks()" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-chip);font-size:12px;background:#fff;">
      <option value="datetime_desc">登録日（新しい順）</option>
      <option value="datetime_asc">登録日（古い順）</option>
      <option value="end_date">読了日順</option>
      <option value="title">あいうえお順</option>
    </select>
    <div style="flex:1;position:relative;">
      <input type="text" id="bookSearchInput" placeholder="タイトル・著者・メモで検索…"
             oninput="debounceSearch()" style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-chip);font-size:12px;">
    </div>
  </div>

  <!-- ピアちゃんバナー -->
  <div class="books-pia-section">
    <img src="/pia-full-3.png" class="books-pia-img" alt="ピアちゃん"
         onerror="this.src='/pia-normal.png'">
    <div class="books-pia-msg">読んだ本を記録して、<br>素敵な読書ライフを！📚</div>
  </div>

  <!-- 読書一覧 -->
  <div class="book-list" id="recentBooks"></div>

</div>

<!-- 書籍編集モーダル -->
<div id="bookEditModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:12px;max-height:85dvh;overflow-y:auto;">
    <div style="font-weight:600;font-size:15px;">読書記録を編集</div>
    <input type="hidden" id="editBookId">

    <div style="display:flex;gap:12px;align-items:flex-start;">
      <div id="editBookCover"></div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;" id="editBookTitle"></div>
        <div style="color:var(--muted);font-size:12px;" id="editBookAuthor"></div>
      </div>
    </div>

    <div>
      <div class="form-label">媒体</div>
      <div class="medium-btns">
        <button class="option-btn" data-edit-medium="owned"   onclick="selectEditMedium('owned')">📖 蔵書</button>
        <button class="option-btn" data-edit-medium="library" onclick="selectEditMedium('library')">🏛 図書館</button>
        <button class="option-btn" data-edit-medium="kindle"  onclick="selectEditMedium('kindle')">📱 Kindle</button>
        <button class="option-btn" data-edit-medium="audible" onclick="selectEditMedium('audible')">🎧 Audible</button>
        <button class="option-btn" data-edit-medium="other"   onclick="selectEditMedium('other')">その他</button>
      </div>
    </div>

    <div>
      <div class="form-label">ステータス</div>
      <div class="status-btns">
        <button class="option-btn" data-edit-status="want"    onclick="selectEditStatus('want')">📌 読みたい</button>
        <button class="option-btn" data-edit-status="reading" onclick="selectEditStatus('reading')">📖 読書中</button>
        <button class="option-btn" data-edit-status="done"    onclick="selectEditStatus('done')">✅ 読了</button>
      </div>
    </div>

    <div>
      <div class="form-label">読了日</div>
      <input type="date" id="editEndDate" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:10px;font-size:14px;">
    </div>

    <div>
      <div class="form-label">タグ</div>
      <input type="text" id="editBookTag" placeholder="タグ（任意）" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:10px;font-size:14px;">
    </div>

    <div>
      <div class="form-label">評価</div>
      <div class="star-input" id="editStarInput">
        <button class="star-btn" data-edit-star="1" onclick="selectEditStar(1)">★</button>
        <button class="star-btn" data-edit-star="2" onclick="selectEditStar(2)">★</button>
        <button class="star-btn" data-edit-star="3" onclick="selectEditStar(3)">★</button>
        <button class="star-btn" data-edit-star="4" onclick="selectEditStar(4)">★</button>
        <button class="star-btn" data-edit-star="5" onclick="selectEditStar(5)">★</button>
      </div>
    </div>

    <div>
      <div class="form-label">感想・メモ</div>
      <textarea id="editBookNote" rows="3"
        style="width:100%;resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:10px;padding:8px 12px;"
        placeholder="感想（任意）"></textarea>
    </div>

    <div style="display:flex;gap:8px;">
      <button class="btn-submit" onclick="saveBookEdit()">保存</button>
      <button class="btn-submit" onclick="closeBookEdit()" style="background:#aaa;">キャンセル</button>
    </div>
    <button class="btn-submit" onclick="deleteBook()" style="background:#ff4444;margin-top:8px;font-size:12px;">この本を削除</button>
  </div>
</div>
